  'micromark': 4.0.2
  'neosanitize': 0.3.0
  'nock': 15.0.0
  'npm-run-all2': 9.0.2
  'oxfmt': 0.59.0
  'oxlint': 1.74.0
  # oxlint-tsgolint — the type-aware lint sidecar the fleet lint runner's
