  'micromark': 4.0.2
  'neosanitize': 0.3.0
  'nock': 15.0.0
  'npm-run-all2': 9.0.2
  'oxfmt': 0.57.0
  'oxlint': 1.72.0
  # Fleet bundler (replaces esbuild). Single-sourced to match the
  # wheelhouse catalog pin + the rolldown vite 8.0.14 bundles natively.
  'playwright-core': 1.61.1
  'regjsparser': 0.13.2
  'rolldown': 1.1.4
  'semver': 7.8.5
  'shell-quote': 1.9.0
  # Source of truth for CI-provider + AI-agent env-var detection. devDep only:
  # the build-time codemod inlines its isCI/isAgent boolean expressions into
  # dist, so it never enters the runtime dependency tree. Published 2026-04-15,
  # well past the 7-day soak — no minimumReleaseAgeExclude needed.
  'std-env': 4.1.0
  'svgo': 4.0.1
  'taze': 19.14.1
  # Vite 8.x is rolldown-native (keeps the fleet bundler rolldown end-to-end,
  # so esbuild never enters the tree). vitest 4.1.x pulls vite transitively;
  # the override below forces that transitive vite to this pin. Pinned to
  # 8.0.16+ to clear GHSA-fx2h-pf6j-xcff (server.fs.deny bypass, fixed 8.0.16).
  'typescript': 7.0.2
  'vite': 8.1.0
  'vitest': 4.1.9

allowBuilds:
  '@anthropic-ai/claude-code': false
  cpu-features: false
  esbuild: true
  protobufjs: false
  rolldown: true
  ssh2: false

# Wait 7 days (10080 minutes) before installing newly published packages.
#
# esbuild is NOT in this tree: vite is pinned to 8.x (rolldown-native) via the
# catalog + the `'vite': 'catalog:'` override above, so the transitive vite that
# vitest pulls is 8.x — which bundles rolldown, not esbuild. The esbuild
# Dependabot advisories are therefore moot here (no esbuild resolves at all).
# Do NOT soak-exclude esbuild to chase an alert: the structurally-correct fix is
# keeping vite on the rolldown-native major, never pulling an unsoaked esbuild.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  # rolldown is the fleet bundler (CLAUDE.md "Tooling": bundler =
  # rolldown, not esbuild). socket-lib's build is migrating off esbuild
  # onto rolldown 1.0.2 — the version vite 8.0.14 bundles natively, and
  # the version single-sourced in the wheelhouse catalog. The
  # per-platform @rolldown/binding-* + @oxc-project/types are optional/
  # transitive deps of rolldown that share its pin. Listed explicitly
  # per the fleet "no scope globs in soak excludes" rule.
  # rolldown's AST/types layer. rolldown 1.0.2 pins `=0.132.0`.
  # Zero-dep shell tokenizer + quoter. Vendored to power shell/parse +
  - 'sfw'
  - '@stuie/*'
  - '@ultrathink/*'
  - '@socketoverride/*'
  - 'socket'
  # esbuild + its platform binaries — test-only browser-bundle e2e dep (the build
  # bundler is rolldown). All published 2026-06-11; the 7-day soak clears
  # 2026-06-18, after which this whole block is removable.
  - '@sdxgen/*'
  - 'sdxgen'
  - 'stuie'
  # published: 2026-07-08 | removable: 2026-07-15
  - '@typescript/typescript-aix-ppc64@7.0.2'
