  '@swc/core': true
  cpu-features: false
  esbuild: true
  protobufjs: false
  puppeteer: false
  rolldown: true
  ssh2: false

# Wait 7 days (10080 minutes) before installing newly published packages.
#
# esbuild is NOT in this tree: vite is pinned to 8.x (rolldown-native) via the
# catalog + the `'vite': 'catalog:'` override above, so the transitive vite that
# vitest pulls is 8.x — which bundles rolldown, not esbuild. The esbuild
# Dependabot advisories are therefore moot here (no esbuild resolves at all).
# Do NOT soak-exclude esbuild to chase an alert: the structurally-correct fix is
# keeping vite on the rolldown-native major, never pulling an unsoaked esbuild.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketregistry/*'
  - '@socketsecurity/*'
  # rolldown is the fleet bundler (CLAUDE.md "Tooling": bundler =
  # rolldown, not esbuild). socket-lib's build is migrating off esbuild
  # onto rolldown 1.0.2 — the version vite 8.0.14 bundles natively, and
  # the version single-sourced in the wheelhouse catalog. The
  # per-platform @rolldown/binding-* + @oxc-project/types are optional/
  # transitive deps of rolldown that share its pin. Listed explicitly
  # per the fleet "no scope globs in soak excludes" rule.
  # rolldown's AST/types layer. rolldown 1.0.2 pins `=0.132.0`.
  # Zero-dep shell tokenizer + quoter. Vendored to power shell/parse +
  - 'sfw'
  - '@stuie/*'
  - '@ultrathink/*'
  - '@socketoverride/*'
  - 'socket'
  # esbuild + its platform binaries — test-only browser-bundle e2e dep (the build
  # bundler is rolldown). All published 2026-06-11; the 7-day soak clears
  # 2026-06-18, after which this whole block is removable.
  - '@sdxgen/*'
  - 'sdxgen'
  - 'stuie'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'
  # oxlint-tsgolint 7.0.2001 — the type-aware lint sidecar the fleet lint
  # runner's whole-tree gate needs. The main package + its per-platform binary
  # family are pinned to the exact version (a scope glob would blanket-bypass a
  # future publish); exact-pinned so a future version re-soaks.
  # published: 2026-07-21 | removable: 2026-07-28
  - 'oxlint-tsgolint@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-x64@7.0.2001'
  # taze 19.16.0 — the dep updater itself; forced ahead of the soak by owner
  # directive so the regenerated single-registry patch (patchedDependencies)
  # tracks the current release. Exact-pinned so a future version re-soaks.
  # published: 2026-07-22 | removable: 2026-07-29
  - 'taze@19.16.0'
  # verkit — new dev-only transitive of taze 19.16.0 (same owner directive);
  # exact-pinned so future versions re-soak.
  # published: 2026-07-19 | removable: 2026-07-26
  - 'verkit@0.1.2'

# Refuse transitive dependencies declared via git/tarball/local-tarball
# specs — an npm package shouldn't be allowed to drag in a git URL we
# don't control (bypasses npm registry validation, no provenance, no
# soak window). Direct git deps are still allowed (the test suite at
