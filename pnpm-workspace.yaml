# Register .claude/hooks/* as workspace packages so taze (run via
# `pnpm run update`) sees and bumps their package.json manifests
# alongside the root. Keeps hook deps in lockstep with the main tree.
#
# tools/* — developer-only utilities (audit/codemod scripts). Not
# published, not part of the dist tree.
#
# vendor/* — vendored upstream code shipped as workspace packages so
# tools can reference it via `workspace:*` instead of brittle
# `../../../vendor/...` relative paths.
packages:
  - .claude/hooks/*
  - tools/*
  - vendor/*

# Catalog entries shared across hook workspaces. The hooks live in
# `.claude/hooks/*` and depend on the same Socket fleet packages the
# repo itself ships. Pinning them here keeps the entire hook tree in
# lockstep with the parent without each hook duplicating literal pins.
catalog:
  '@redwoodjs/agent-ci': 0.16.2
  '@sinclair/typebox': 0.34.49
  '@socketregistry/packageurl-js': 'npm:@socketregistry/packageurl-js@1.4.2'
  '@types/shell-quote': 1.7.5
  # -stable aliases: pnpm `overrides:` can't redirect a package's own
  # name when used inside that same package — Node ESM treats it as a
  # self-reference and resolves through the local `exports` map, not
  # the override. The 4 Socket-published packages therefore need a
  # SECOND name (`<canonical>-stable`) aliased via `npm:` to the
  # published version. Build / hook / script / config code uses the
  # -stable name so it always resolves to the published catalog
  # version regardless of where the importing file lives. src/ + test/
  # code uses the canonical name because vitest aliases that to local
  # src/.
  '@socketregistry/packageurl-js-stable': 'npm:@socketregistry/packageurl-js@1.4.2'
  '@socketsecurity/lib': 'npm:@socketsecurity/lib@6.0.6'
  '@socketsecurity/lib-stable': 'npm:@socketsecurity/lib@6.0.6'
  '@socketsecurity/registry': 'npm:@socketsecurity/registry@2.0.2'
  '@socketsecurity/registry-stable': 'npm:@socketsecurity/registry@2.0.2'
  '@socketsecurity/sdk': 'npm:@socketsecurity/sdk@4.0.1'
  '@socketsecurity/sdk-stable': 'npm:@socketsecurity/sdk@4.0.1'
  '@types/mdast': 4.0.4
  '@types/node': 24.9.2
  '@typescript/native-preview': 7.0.0-dev.20260510.1
  '@vitest/coverage-v8': 4.1.6
  '@vitest/ui': 4.1.6
  'dtu-github-actions': 0.16.2
  'ecc-agentshield': 1.4.0
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'npm-run-all2': 9.0.0
  'oxfmt': 0.48.0
  'oxlint': 1.63.0
  # Fleet bundler (replaces esbuild). Single-sourced to match the
  # wheelhouse catalog pin + the rolldown vite 8.0.14 bundles natively.
  'rolldown': 1.0.3
  'shell-quote': 1.8.4
  'taze': 19.11.0
  'vitest': 4.1.6

allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  rolldown: true
  ssh2: false

# Wait 7 days (10080 minutes) before installing newly published packages.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  # Network-mocking lib used in fleet test suites. v15 betas pre-date
  # npm's `time` field for the major; allow pinned beta until v15 GA.
  - 'nock@15.0.0-beta.11'
  - 'npm-run-all2@9.0.0'
  # rolldown is the fleet bundler (CLAUDE.md "Tooling": bundler =
  # rolldown, not esbuild). socket-lib's build is migrating off esbuild
  # onto rolldown 1.0.2 — the version vite 8.0.14 bundles natively, and
  # the version single-sourced in the wheelhouse catalog. The
  # per-platform @rolldown/binding-* + @oxc-project/types are optional/
  # transitive deps of rolldown that share its pin. Listed explicitly
  # per the fleet "no scope globs in soak excludes" rule.
  # published: 2026-05-13 | removable: 2026-05-20
  - '@rolldown/pluginutils@1.0.1'
  # rolldown's AST/types layer. rolldown 1.0.2 pins `=0.132.0`.
  # Zero-dep shell tokenizer + quoter. Vendored to power shell/parse +
  # shell/quote and the re-based argv/parse-args-string. Already the
  # fleet-canonical shell parser used by .claude/hooks/_shared.
  # published: 2026-05-22 | removable: 2026-05-29
  - 'shell-quote@1.8.4'
  - 'shell-quote'
  - '@rolldown/pluginutils'
  - '@redwoodjs/agent-ci'
  - 'dtu-github-actions'
  - '@socketdev/*'
  - 'ecc-agentshield'
  - 'sfw'
  - 'socket-*'
  - '@redwoodjs/agent-ci@0.16.2'
  - 'dtu-github-actions@0.16.2'
  # published: 2026-05-27 | removable: 2026-06-03
  - 'compromise@14.15.1'
  # published: 2026-05-21 | removable: 2026-05-28
  - 'vite@8.0.14'
