# Register .claude/hooks/* as workspace packages so taze (run via
# `pnpm run update`) sees and bumps their package.json manifests
# alongside the root. Keeps hook deps in lockstep with the main tree.
#
# tools/* — developer-only utilities (audit/codemod scripts). Not
# published, not part of the dist tree.
#
# vendor/* — vendored upstream code shipped as workspace packages so
# tools can reference it via `workspace:*` instead of brittle
# `../../../vendor/...` relative paths.
packages:
  - .claude/hooks/*
  - tools/*
  - vendor/*

allowBuilds:
  esbuild: true

# Wait 7 days (10080 minutes) before installing newly published packages.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'

overrides:
  '@inquirer/ansi': 2.0.5
  '@inquirer/core': 11.1.8
  '@inquirer/figures': 2.0.5
  '@npmcli/arborist': 9.1.6
  '@npmcli/git': 6.0.3
  '@npmcli/installed-package-contents': 4.0.0
  '@npmcli/name-from-folder': 4.0.0
  '@npmcli/promise-spawn': 9.0.1
  '@npmcli/redact': 4.0.0
  '@npmcli/run-script': 10.0.0
  '@sigstore/core': 3.1.0
  '@sigstore/sign': 4.1.0
  ansi-regex: 6.2.2
  brace-expansion: 5.0.5
  chownr: 3.0.0
  debug: 4.4.3
  execa: 5.1.1
  has-flag: 5.0.1
  hosted-git-info: 8.1.0
  isexe: 3.1.1
  json-parse-even-better-errors: 5.0.0
  lru-cache: 11.2.2
  make-fetch-happen: 15.0.5
  minimatch: 9.0.6
  minipass: 7.1.3
  minipass-fetch: 4.0.1
  minipass-flush: 1.0.7
  minipass-sized: 1.0.3
  minipass@7: 7.1.3
  minizlib: 3.1.0
  npm-bundled: 5.0.0
  npm-normalize-package-bin: 5.0.0
  npm-package-arg: 12.0.2
  npm-pick-manifest: 10.0.0
  p-map: 7.0.4
  pacote: 21.5.0
  picomatch: 4.0.4
  proc-log: 6.1.0
  semver: 7.7.2
  signal-exit: 4.1.0
  spdx-expression-parse: 4.0.0
  ssri: 12.0.0
  string-width: 8.1.0
  strip-ansi: 7.1.2
  supports-color: 10.2.2
  tar: 7.5.11
  which: 5.0.0
  wrap-ansi: 9.0.2
  yoctocolors-cjs: 2.1.3

patchedDependencies:
  '@npmcli/run-script@10.0.0': patches/@npmcli__run-script@10.0.0.patch
  '@sigstore/sign@4.1.0': patches/@sigstore__sign@4.1.0.patch
  execa@5.1.1: patches/execa@5.1.1.patch
  minipass-flush@1.0.7: patches/minipass-flush@1.0.7.patch
  minipass-pipeline@1.2.4: patches/minipass-pipeline@1.2.4.patch
  minipass-sized@1.0.3: patches/minipass-sized@1.0.3.patch
  node-gyp@11.5.0: patches/node-gyp@11.5.0.patch
  pony-cause@2.1.11: patches/pony-cause@2.1.11.patch

# Refuse to run if the pnpm version on PATH differs from the packageManager
# field in package.json. Our setup action pins pnpm via external-tools.json;
# any drift should fail fast, not silently auto-download via @pnpm/exe
# (which in rc.5 leaves a placeholder launcher that errors at runtime).
pmOnFail: error
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@yarnpkg/core@4.5.0'
  - '@yarnpkg/libzip@3.2.2'

# Auto-install missing peer deps (pnpm default). Declared explicitly
# so a future default flip can't silently change install behavior.
autoInstallPeers: true

# Run pre/post lifecycle scripts on the workspace root (e.g.
# prepare -> husky). This is the pnpm default; declared explicitly
# so a future default flip can't silently disable husky setup.
enablePrePostScripts: true

# Pin exact versions on `pnpm add`. Catalog and overrides should
# also be exact pins (5.24.0, not ^5.24.0).
saveExact: true
