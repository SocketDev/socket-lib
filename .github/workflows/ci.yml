name: ⚡ CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@29100ff292fefdae4eba0ab2a40697fea06b1ad2 # main (2026-05-25)
    with:
      test-script: 'pnpm exec vitest --config .config/vitest.config.mts run'

  test-isolated:
    name: Test (Isolated)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@11236f6ebd45f1f50947d75f4dc81b6c8a6b0d6a # main (2026-05-25)
      - name: Build project
        run: pnpm run build

      - name: Run isolated tests
        run: pnpm exec vitest --config .config/vitest.config.isolated.mts run
