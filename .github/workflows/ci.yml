name: ⚡ CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      node-versions:
        description: 'Node.js versions to test (JSON array)'
        required: false
        type: string
        default: '["22", "24"]'

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@7fa48b6cd525f57f98d92dbd35794cc9b20f2d14 # main
    with:
      test-setup-script: 'pnpm run build'
      lint-script: 'pnpm run lint --all'
      type-check-script: 'pnpm run check'
      test-script: 'pnpm exec vitest --config .config/vitest.config.mts run'
      node-versions: ${{ inputs.node-versions || '["22", "24"]' }}
      os-versions: '["ubuntu-latest", "windows-latest"]'
      fail-fast: false
      max-parallel: 4
      test-timeout-minutes: 15

  # Isolated test suite - runs separately with full isolation
  test-isolated:
    name: Test (Isolated)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@7fa48b6cd525f57f98d92dbd35794cc9b20f2d14 # main
        with:
          node-version: '24'

      - name: Build project
        run: pnpm run build

      - name: Run isolated tests
        run: pnpm exec vitest --config .config/vitest.config.isolated.mts run
