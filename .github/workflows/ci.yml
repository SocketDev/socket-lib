name: ⚡ CI

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/ci.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Run CI Pipeline
    uses: SocketDev/socket-registry/.github/workflows/ci.yml@5c06f15d39c5538513a9b7842ddb07d1b042f5d3 # main (2026-05-15)
    with:
      test-script: 'pnpm exec vitest --config .config/vitest.config.mts run'

  test-isolated:
    name: Test (Isolated)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@5c06f15d39c5538513a9b7842ddb07d1b042f5d3 # main (2026-05-15)
      - name: Build project
        run: pnpm run build

      - name: Run isolated tests
        run: pnpm exec vitest --config .config/vitest.config.isolated.mts run
