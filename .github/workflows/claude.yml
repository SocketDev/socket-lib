name: 🤖 Claude Code

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/claude.yml

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: read        # Read repository code for Claude analysis
  id-token: write       # Generate OIDC token for Anthropic API authentication
  issues: write         # Post Claude responses to issues
  pull-requests: write  # Post Claude responses to PR comments

jobs:
  claude:
    uses: SocketDev/socket-registry/.github/workflows/claude.yml@4709a2443e5a036bb0cd94e5d1559f138f05994c # main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
