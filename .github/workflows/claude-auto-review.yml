name: 🤖 Claude Auto Review

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/claude-auto-review.yml

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read        # Read repository code for analysis
  id-token: write       # Generate OIDC token for Anthropic API authentication
  pull-requests: read   # Read PR metadata and diff for review

jobs:
  auto-review:
    uses: SocketDev/socket-registry/.github/workflows/claude-auto-review.yml@4709a2443e5a036bb0cd94e5d1559f138f05994c # main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
