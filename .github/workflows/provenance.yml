name: 📦 Publish to npm

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (default: true)'
        required: false
        default: true
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions:
  contents: write # Push git tags and create GitHub releases
  id-token: write # NPM trusted publishing via OIDC

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@3ee41c620baed62f610b3cffe64e3fda68bcbb8d # main (2026-05-26)
    with:
      debug: ${{ inputs.debug }}
      dry-run: ${{ inputs.dry-run }}
      # Binds the publish job to the `npm-publish` GitHub environment so the
      # OIDC token carries an environment claim — npm's documented
      # disambiguator for the workflow_call trusted-publisher path. The
      # matching environment must be configured on the package's npm
      # trusted publisher.
      environment: 'npm-publish'
      package-name: '@socketsecurity/lib'
      setup-script: 'pnpm run build'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
