name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions:
  contents: write   # Push git tags and create GitHub releases
  id-token: write   # NPM trusted publishing via OIDC

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@024156f835eb8627c9ca5bcc44ef84cb2b1c6c41 # main
    with:
      debug: ${{ inputs.debug }}
      package-name: '@socketsecurity/lib'
      setup-script: 'pnpm run build'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_KEY: ${{ secrets.SOCKET_API_TOKEN }}
