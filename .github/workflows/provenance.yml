name: 📦 Publish

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Stage everything but pass --dry-run to npm publish; nothing reaches the registry. Default: true — uncheck to opt into a real publish.'
        required: false
        default: true
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions:
  contents: write   # Push git tags and create GitHub releases
  id-token: write   # NPM trusted publishing via OIDC

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@75964f14e0682ae4aa846119e2fc9a710d970056 # main (2026-05-15)
    with:
      debug: ${{ inputs.debug }}
      dry-run: ${{ inputs.dry-run }}
      package-name: '@socketsecurity/lib'
      setup-script: 'pnpm run build'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
