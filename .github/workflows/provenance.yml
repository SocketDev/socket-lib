name: 📦 Publish to npm

# Dependencies:
#   - SocketDev/socket-registry/.github/workflows/provenance.yml

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (--dry-run on npm publish, default: true)'
        required: false
        default: true
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: '0'
        type: string
        options:
          - '0'
          - '1'

permissions:
  contents: write # Push git tags and create GitHub releases
  id-token: write # NPM trusted publishing via OIDC

jobs:
  publish:
    uses: SocketDev/socket-registry/.github/workflows/provenance.yml@501a267e1434f36eaf45110d5bd5751e2adfa944 # main (2026-05-20)
    with:
      debug: ${{ inputs.debug }}
      dry-run: ${{ inputs.dry-run }}
      package-name: '@socketsecurity/lib'
      setup-script: 'pnpm run build'
      use-trusted-publishing: true
    secrets:
      SOCKET_API_TOKEN: ${{ secrets.SOCKET_API_TOKEN }}
